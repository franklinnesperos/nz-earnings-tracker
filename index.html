<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Earnings & Leave Tracker</title>
    <style>
        :root { --primary: #2c3e50; --accent: #16a085; --bg: #f5f7fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 850px; padding: 15px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 20px; text-transform: uppercase; }
        .rate-config { background: #edf2f7; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
        .rate-config input { width: 80px; padding: 6px; text-align: center; border: 1px solid #cbd5e1; border-radius: 4px; font-weight: 700; }
        
        .table-wrapper { overflow-x: auto; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 600px; }
        th { background: #475569; color: white; padding: 10px; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        
        .date-box { display: flex; gap: 4px; align-items: center; }
        select, input[type="number"] { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; font-weight: 600; box-sizing: border-box; }
        select { background: white; width: 65px; }
        .day-input { width: 45px; text-align: center; }
        .year-input { width: 60px; text-align: center; }
        .gross-input { width: 100%; }
        
        .live-cell { font-family: monospace; font-weight: 700; color: #334155; font-size: 14px; }
        .hours-cell { color: #16a085; }
        
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 20px; font-size: 14px; }
        
        .total-row-style { background: #1e293b !important; color: white; font-weight: 700; }
        .total-row-style td { border-top: 2px solid #0f172a; padding: 12px 10px; font-size: 14px; }
        .total-label { text-transform: uppercase; font-size: 11px; color: #94a3b8; }
        
        .btn-clear { background: #f1f5f9; color: #64748b; border: none; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; width: 100%; }
        .remove-btn { background: #ef4444; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>NZ Earnings & Leave Tracker</h2>
    </div>

    <!-- Hourly Rate Config -->
    <div class="rate-config">
        <label>Hourly Rate (NZD):</label>
        <input type="number" id="hourlyRate" value="29.66" step="0.01" oninput="calculateTotals()">
    </div>

    <!-- Main Table Layout -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">Petsa / Date (Month Day, Year)</th>
                    <th style="width: 25%;">Gross Income</th>
                    <th style="width: 20%;">Annual Leave (8%)</th>
                    <th style="width: 15%;">Oras / Hours</th>
                    <th style="width: 10%;"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Dito papasok ang mga entries ng cut-off -->
            </tbody>
            <tfoot>
                <tr class="total-row-style">
                    <td><span class="total-label">KABUUANG TOTAL:</span></td>
                    <td id="grandGross" style="color: #38bdf8; font-family: monospace;">$0.00</td>
                    <td id="grandLeaveNZD" style="color: #34d399; font-family: monospace;">$0.00</td>
                    <td id="grandLeaveHours" style="color: #fbbf24; font-family: monospace;">0.00 hrs</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <button class="btn-add" onclick="addNewRow()">+ Magdagdag ng Bagong Cut-off</button>
    <button class="btn-clear" onclick="clearAll()">Reset Tracker</button>
</div>

<script>
    const shortMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    // Kumuha ng default petsa ngayon para sa bagong row
    const currentDate = new Date();
    const currentMonthText = shortMonths[currentDate.getMonth()];
    const currentDayNum = currentDate.getDate();
    const currentYearNum = currentDate.getFullYear(); // Awtomatikong 2026

    // Load saved data
    let trackerData = JSON.parse(localStorage.getItem('nz_earnings_year_data')) || [
        { month: currentMonthText, day: currentDayNum, year: currentYearNum, gross: "" }
    ];

    function saveToStorage() {
        localStorage.setItem('nz_earnings_year_data', JSON.stringify(trackerData));
    }

    function formatNZD(amount) {
        return "$" + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        const rate = parseFloat(document.getElementById('hourlyRate').value) || 29.66;
        
        trackerData.forEach((item, index) => {
            const grossNum = parseFloat(item.gross) || 0;
            const leaveNZD = grossNum * 0.08;
            const leaveHours = leaveNZD / rate;

            // Gumawa ng mga opsyon para sa 3-letter months
            let monthOptions = "";
            shortMonths.forEach(m => {
                const selected = item.month === m ? "selected" : "";
                monthOptions += `<option value="${m}" ${selected}>${m}</option>`;
            });

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="date-box">
                        <select onchange="updateData(${index}, 'month', this.value)">
                            ${monthOptions}
                        </select>
                        <input type="number" class="day-input" value="${item.day}" min="1" max="31" placeholder="DD" oninput="updateData(${index}, 'day', this.value)">
                        <input type="number" class="year-input" value="${item.year}" min="2020" max="2100" placeholder="YYYY" oninput="updateData(${index}, 'year', this.value)">
                    </div>
                </td>
                <td>
                    <input type="number" class="gross-input" value="${item.gross}" placeholder="0.00" step="0.01" oninput="updateData(${index}, 'gross', this.value)">
                </td>
                <td class="live-cell">${formatNZD(leaveNZD)}</td>
                <td class="live-cell hours-cell">${leaveHours.toFixed(2)} hrs</td>
                <td style="text-align: center;">
                    ${trackerData.length > 1 ? `<button class="remove-btn" onclick="removeRow(${index})">X</button>` : ''}
                </td>
            `;
            tbody.appendChild(tr);
        });
        
        calculateTotals();
    }

    function addNewRow() {
        const lastMonth = trackerData[trackerData.length - 1]?.month || currentMonthText;
        const lastDay = trackerData[trackerData.length - 1]?.day || currentDayNum;
        const lastYear = trackerData[trackerData.length - 1]?.year || currentYearNum;
        trackerData.push({ month: lastMonth, day: lastDay, year: lastYear, gross: "" });
        saveToStorage();
        renderTable();
    }

    function removeRow(index) {
        trackerData.splice(index, 1);
        saveToStorage();
        renderTable();
    }

    function updateData(index, field, value) {
        trackerData[index][field] = value;
        saveToStorage();
        
        const rate = parseFloat(document.getElementById('hourlyRate').value) || 29.66;
        if (field === 'gross') {
            const rows = document.getElementById('tableBody').children;
            const grossNum = parseFloat(value) || 0;
            const leaveNZD = grossNum * 0.08;
            const leaveHours = leaveNZD / rate;
            
            rows[index].children[2].innerText = formatNZD(leaveNZD);
            rows[index].children[3].innerText = leaveHours.toFixed(2) + " hrs";
        }
        
        calculateTotals();
    }

    function calculateTotals() {
        let totalGross = 0;
        const rate = parseFloat(document.getElementById('hourlyRate').value) || 29.66;

        trackerData.forEach(item => {
            totalGross += parseFloat(item.gross) || 0;
        });

        const totalLeaveNZD = totalGross * 0.08;
        const totalLeaveHours = totalLeaveNZD / rate;

        document.getElementById('grandGross').innerText = formatNZD(totalGross);
        document.getElementById('grandLeaveNZD').innerText = formatNZD(totalLeaveNZD);
        document.getElementById('grandLeaveHours').innerText = totalLeaveHours.toFixed(2) + " hrs";
    }

    function clearAll() {
        if(confirm("Sigurado ka bang nais mong burahin lahat ng entry?")) {
            trackerData = [{ month: currentMonthText, day: currentDayNum, year: currentYearNum, gross: "" }];
            saveToStorage();
            renderTable();
        }
    }

    renderTable();
</script>

</body>
</html>
